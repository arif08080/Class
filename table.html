<!DOCTYPE html>

<html>

<head>
	<title>Feedback Form</title>
	<link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Feedback Form</h1>

    <form method="POST">
        <div>
            <label for="name">Name</label>
            <input 
                type="text" 
                id="name" 
                minlength="3" 
                maxlength="50" 
                required
            >
        </div>

        <br>

        <div>
            <label for="portfolio">Portfolio</label>
            <input 
                type="url" 
                id="portfolio" 
                required
            >
        </div>

        <br>

        <div>
            <label for="favColor">Favorite Color</label>
            <input 
                type="color" 
                id="favColor"
            >
        </div>

        <br>

        <div>
            <label for="likeness">Likeness</label>
            <input 
                type="range" 
                id="likeness" 
                min="1" 
                max="100"
            >
        </div>

        <br>

        <button type="submit">Submit</button>
    </form>

</body>
</html>
