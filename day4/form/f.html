<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form method="post">
    <label for="name">Name</label>
    <input type="text" id="name" placeholder="Name" required>

    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Email" required>

    <label>Gender</label>
    <input type="radio" id="gender_m" name="gender" required>
    <label for="gender_m">Male</label>
    <input type="radio" id="gender_f" name="gender" required>
    <label for="gender_f">Female</label>

    <label for="cars">Car Brands</label>
    <select id="cars" required>
        <option value="" disabled selected>--Please choose an option--</option>
        <option value="toyota">Toyota</option>
        <option value="honda">Honda</option>
    </select>

    <label for="age">Age</label>
    <input type="number" id="age" placeholder="Age" required>

    <label for="dob">DOB</label>
    <input type="date" id="dob" required>

    <label for="tel">Phone Number</label>
    <input type="tel" id="tel" placeholder="xxx-xxx-xxxx">

    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Password" required>

    <input type="checkbox" id="tos" required>
    <label for="tos">I agree to the TOS</label>

    <button type="submit">Submit</button>
</form>
</body>
</html>
