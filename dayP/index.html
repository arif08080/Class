<!DOCTYPE html>
<html>
<head>
    <style>
        table {
            border-collapse: separate;
            border-spacing: 5px;
            width: 100%;
            text-align: center;
        }
        th, td {
            border: 1px solid black;
            padding: 10px;
        }
       
        ul {
            text-align: left;
            display: inline-block;
        }
    </style>
</head>
<body>

    <table border="1" style="width: 800px; margin: auto;">
        <tr>
            <td>
                <table border="1">
                    <tr>
                        <th colspan="2">Nested Table 2</th>
                    </tr>
                    <tr>
                        <th width="50%">Column 1</th>
                        <th width="50%">Column 2</th>
                    </tr>
                    <tr>
                        <td>abc</td>
                        <td>def</td>
                    </tr>
                </table>
            </td>
            
            <td width="50%" align="center">
                <table border="1">
                    <tr>
                        <th>Nested Table 1</th>
                    </tr>
                    <tr>
                        <td>
                            <ul>
                                <li>List item</li>
                                <li>List item</li>
                                <li>List item</li>
                            </ul>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
        
        <tr>
            <td>
                <table border="1">
                    <tr>
                        <th colspan="2">Nested Table 3</th>
                    </tr>
                    <tr>
                        <td width="50%"><a href="#">Nested Table</a></td>
                        <td width="50%">Demo Continued</td>
                    </tr>
                </table>
            </td>
            
            <td>
                <table border="1">
                    <tr>
                        <th>Nested Table 4</th>
                    </tr>
                    <tr>
                        <td bgcolor="black" style="color: white;">HTML</td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>

</body>
</html>
