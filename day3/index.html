<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table</title>
</head>
<body>
    <table border="2px" width="50%">
        <tr>
            <th>Name</th>
            <th>Rollno</th>
            <th>Attendance</th>
        </tr>

        <tr>
            <td>Arif</td>
            <td>08</td>
            <td>P</td>
        </tr> 
    </table>


    <!-- column wise -->
     <!-- cellspacing- increases the gap b/w the boxes -->
      <!-- cellpadding- increases the space b/w the cell border and the content(text/images) -->

    <table border="2px" width="50%" align="center" cellpadding="10px" cellspacing="10px" >
        <tr>
            <th>Name</th>
            <td>Arif</td>
            <td>asif</td>
        </tr>

        <tr>
            <th>Rollno</th>
            <td>08</td>
            <td>09</td>
        </tr>

        <tr>
            <th>Attendance</th>
            <td>P</td>
            <td>p</td>
        </tr>
    </table>
